version: "2"

issues:
  # Disable limits on the number of printed issues
  max-issues-per-linter: 0 # 0 = no limit
  max-same-issues: 0 # 0 = no limit

formatters:
  enable:
    - goimports

linters:
  default: all
  settings:
    lll:
      line-length: 100
  exclusions:
    rules:
      - linters:
          - lll
        source: "^//go:generate "
      - linters:
          - lll
        source: "https?://"
  disable:
    - containedctx
    - contextcheck
    - cyclop
    - depguard
    - dupl
    - err113
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - forcetypeassert
    - funcorder
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocyclo
    - godox
    - gosec
    - gosmopolitan
    - iface
    - interfacebloat
    - intrange
    - ireturn
    - maintidx
    - mnd
    - nestif
    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nonamedreturns
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - recvcheck
    - revive
    - staticcheck
    - tparallel
    - testableexamples
    - testpackage
    - unqueryvet
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
